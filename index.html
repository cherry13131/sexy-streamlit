<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 자원 모니터링 시스템</title>
    <link rel="stylesheet" href="style.css">
    <!-- 차트를 그리기 위한 Chart.js 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>학교 자원 실시간 모니터링</h1>
        <p>실시간 물 및 전기 사용량 대시보드</p>
    </header>

    <main class="dashboard-container">
        <!-- 상단 요약 카드 섹션 -->
        <section class="summary-cards">
            <div class="card">
                <h3>현재 전기 사용량</h3>
                <p class="value" id="electricity-val">-- kWh</p>
            </div>
            <div class="card">
                <h3>현재 수도 사용량</h3>
                <p class="value" id="water-val">-- L</p>
            </div>
        </section>

        <!-- 차트 섹션 -->
        <section class="charts-section">
            <div class="chart-box">
                <h2>전기 사용량 추이 (실시간)</h2>
                <canvas id="electricityChart"></canvas>
            </div>
            <div class="chart-box">
                <h2>수도 사용량 추이 (실시간)</h2>
                <canvas id="waterChart"></canvas>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
