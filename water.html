<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수도 사용량 모니터링 - 학교 자원 모니터링</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="dashboard-container">

        <div class="page-header">
            <div>
                <h1>💧 수도 연간 모니터링</h1>
                <p>2025년 연간 수도 사용 대시보드</p>
            </div>
            <a href="index.html" class="back-btn">← 메인으로</a>
        </div>

        <div class="top-cards">
            <div class="card">
                <div class="icon-box green"><i class="fas fa-tint"></i></div>
                <div class="card-info">
                    <h3>수도 사용량</h3>
                    <div class="value green-text">6,152  <span>L</span></div>
                </div>
            </div>

            <div class="card">
                <div class="icon-box teal"><i class="fas fa-chart-line"></i></div>
                <div class="card-info">
                    <h3>사용 요금</h3>
                    <div class="value teal-text">11,448,500 <span>원</span></div>
                </div>
            </div>

            <div class="card">
                <div class="icon-box green"><i class="fas fa-leaf"></i></div>
                <div class="card-info">
                    <h3>전기 사용으로 발생된 이산화탄소</h3>
                    <div class="value green-text">약 2,042 <span>kg</span></div>
                </div>
            </div>
        </div>

        <div class="bottom-sections">
            <div class="chart-card text-content-card">
                <h3 class="highlight-title">발생된 이산화 탄소를 정화하기 위해 필요한 나무 : 약 3,713 그루</h3>
                <p class="highlight-desc">6,152 L의 물을 사용하기 위해 납부한 11,448,500원은 영양실조 위험에 처한 아이들에게 총 22,897끼니의 식사를 제공할 수 있는 금액 입니다</p>
            </div>

            <div class="line-chart-box">
                <div class="line-header">
                    <h3>물 사용량 추이 <span>(L)</span></h3>
                    
                </div>
                <div class="canvas-container">
                    <canvas id="waterLine"></canvas>
                </div>
            </div>
        </div>

    </div>


    <footer>
        <p>© 2026 학교 자원 모니터링 시스템. All rights reserved.</p>
    </footer>

    <script>
        Chart.defaults.font.family = "'Noto Sans KR', sans-serif";

    

        // 라인 차트
        const ctx = document.getElementById('waterLine').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 180);
        gradient.addColorStop(0, 'rgba(125, 194, 66, 0.2)');
        gradient.addColorStop(1, 'rgba(125, 194, 66, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'],
                datasets: [{
                    data: [276, 915, 1210, 1024, 1127, 1022, 628, 750, 820, 910, 880, 450],
                    borderColor: '#7dc242',
                    backgroundColor: gradient,
                    fill: true,
                    pointBorderColor: '#7dc242',
                    pointBackgroundColor: '#fff',
                    pointBorderWidth: 2,
                    tension: 0.4,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 11 } } },
                    y: { min: 0, max: 1500, grid: { color: '#f3f4f6' }, ticks: { color: '#9ca3af', stepSize: 50 } }
                },
                elements: { point: { radius: 3 } }
            }
        });
    </script>

</body>
</html>
